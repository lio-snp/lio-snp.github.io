      <path d="M0,0 L0,6 L8,3 z" fill="#B45309"/>
    </marker>
  </defs>

  <line x1="230" y1="225" x2="292" y2="197" stroke="#0E7490" stroke-width="3" marker-end="url(#arrow-teal)"/>
