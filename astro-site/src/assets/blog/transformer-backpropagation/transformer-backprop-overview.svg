  <line x1="422" y1="272" x2="494" y2="252" stroke="#0E7490" stroke-width="3" marker-end="url(#arrow-teal)"/>
  <line x1="668" y1="238" x2="736" y2="238" stroke="#0E7490" stroke-width="3" marker-end="url(#arrow-teal)"/>
  <line x1="422" y1="347" x2="930" y2="238" stroke="#0E7490" stroke-width="3" marker-end="url(#arrow-teal)"/>
  <line x1="868" y1="238" x2="930" y2="238" stroke="#0E7490" stroke-width="3" marker-end="url(#arrow-teal)"/>
  <line x1="1010" y1="274" x2="1010" y2="340" stroke="#0E7490" stroke-width="3" marker-end="url(#arrow-teal)"/>
  <line x1="930" y1="376" x2="868" y2="505" stroke="#0E7490" stroke-width="3" marker-end="url(#arrow-teal)"/>
  <line x1="736" y1="514" x2="668" y2="514" stroke="#0E7490" stroke-width="3" marker-end="url(#arrow-teal)"/>
  <line x1="494" y1="514" x2="422" y2="514" stroke="#0E7490" stroke-width="3" marker-end="url(#arrow-teal)"/>

  <path d="M736 570 C700 612, 534 624, 422 550" stroke="#B45309" stroke-width="3.5" fill="none" stroke-dasharray="10 8" marker-end="url(#arrow-amber)"/>
  <path d="M930 420 C874 470, 744 470, 668 420" stroke="#B45309" stroke-width="3.5" fill="none" stroke-dasharray="10 8" marker-end="url(#arrow-amber)"/>
  <path d="M930 190 C854 132, 650 136, 422 244" stroke="#B45309" stroke-width="3.5" fill="none" stroke-dasharray="10 8" marker-end="url(#arrow-amber)"/>
  <path d="M736 190 C650 128, 512 126, 422 169" stroke="#B45309" stroke-width="3.5" fill="none" stroke-dasharray="10 8" marker-end="url(#arrow-amber)"/>
  <path d="M930 190 C830 130, 610 120, 422 320" stroke="#B45309" stroke-width="3.5" fill="none" stroke-dasharray="10 8" marker-end="url(#arrow-amber)"/>

  <text x="83" y="610" fill="#64748B" font-family="Arial, Helvetica, sans-serif" font-size="18">Backward recap: dY -> dH -> dO -> (dA, dV) -> dS -> (dQ, dK) -> dX and parameter gradients.</text>
</svg>
